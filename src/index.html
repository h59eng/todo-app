<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Design Ref: §5 UI/UX Design — Layout */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f8f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px 24px;
      height: fit-content;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1c20;
      margin-bottom: 24px;
    }

    /* 입력 폼 */
    #todo-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    #todo-input {
      flex: 1;
      height: 40px;
      padding: 0 12px;
      border: 1px solid #dcdee3;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1c20;
      background: #f7f8f9;
      outline: none;
    }

    #todo-input::placeholder { color: #b0b3ba; }

    #todo-input:focus {
      border-color: #5e98fe;
      box-shadow: 0 0 0 2px rgba(94, 152, 254, 0.2);
    }

    #add-btn {
      height: 40px;
      padding: 0 16px;
      background: #ff6600;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    #add-btn:hover { background: #e14d00; }

    /* 필터 탭 */
    #filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      height: 32px;
      padding: 0 12px;
      background: #f3f4f5;
      color: #1a1c20;
      border: none;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .filter-btn.active {
      background: #1a1c20;
      color: #ffffff;
    }

    /* Todo 목록 */
    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 40px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 8px;
      background: #ffffff;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #ff6600;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      color: #1a1c20;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #b0b3ba;
    }

    .delete-btn {
      height: 28px;
      padding: 0 10px;
      background: transparent;
      color: #868b94;
      border: 1px solid #dcdee3;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: #fa342c;
      color: #ffffff;
      border-color: #fa342c;
    }

    /* 빈 상태 */
    .empty-state {
      text-align: center;
      padding: 24px 0;
      color: #868b94;
      font-size: 14px;
    }

    /* 카운터 */
    #todo-count {
      margin-top: 16px;
      font-size: 13px;
      color: #868b94;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Todo List</h1>

    <!-- Design Ref: §5.3 입력 폼 -->
    <form id="todo-form">
      <input
        type="text"
        id="todo-input"
        placeholder="할 일을 입력하세요..."
        autocomplete="off"
      >
      <button type="submit" id="add-btn">추가</button>
    </form>

    <!-- Design Ref: §5.3 필터 탭 -->
    <div id="filter-tabs">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="active">진행중</button>
      <button class="filter-btn" data-filter="completed">완료</button>
    </div>

    <!-- Design Ref: §5.3 Todo 목록 -->
    <ul id="todo-list"></ul>

    <!-- Design Ref: §5.1 카운터 -->
    <p id="todo-count"></p>
  </div>

  <script type="module">
    // 아래 두 값을 교체하세요:
    // 로컬: supabase start 출력값 / 프로덕션: Supabase 대시보드 Project Settings > API
    const SUPABASE_URL = 'http://127.0.0.1:54321';
    const SUPABASE_ANON_KEY = 'your-anon-key-here';

    const { createClient } = window.supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let todos = [];
    let currentFilter = 'all';

    // Design Ref: §2.3 Infrastructure — Supabase
    async function loadTodos() {
      const { data, error } = await db
        .from('todos')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) { console.error('load error:', error); return; }
      todos = data;
      render();
    }

    async function addTodo(text) {
      // Plan SC: FR-01 빈 입력값 방지
      const trimmed = text.trim();
      if (!trimmed) return;

      const { data, error } = await db
        .from('todos')
        .insert({ text: trimmed, completed: false })
        .select()
        .single();

      if (error) { console.error('add error:', error); return; }
      todos.push(data);
      render();
    }

    async function toggleTodo(id) {
      // Plan SC: FR-02 완료 토글
      const todo = todos.find(t => t.id === id);
      if (!todo) return;

      const { error } = await db
        .from('todos')
        .update({ completed: !todo.completed })
        .eq('id', id);

      if (error) { console.error('toggle error:', error); return; }
      todo.completed = !todo.completed;
      render();
    }

    async function deleteTodo(id) {
      // Plan SC: FR-03 항목 삭제
      const { error } = await db
        .from('todos')
        .delete()
        .eq('id', id);

      if (error) { console.error('delete error:', error); return; }
      todos = todos.filter(t => t.id !== id);
      render();
    }

    function filterTodos() {
      // Plan SC: FR-04 필터링
      if (currentFilter === 'active') return todos.filter(t => !t.completed);
      if (currentFilter === 'completed') return todos.filter(t => t.completed);
      return todos;
    }

    // Design Ref: §2.3 Presentation — DOM 업데이트
    function render() {
      const list = document.getElementById('todo-list');
      const count = document.getElementById('todo-count');
      const filtered = filterTodos();

      list.innerHTML = '';

      if (filtered.length === 0) {
        const empty = document.createElement('li');
        empty.className = 'empty-state';
        empty.textContent = '할 일이 없습니다.';
        list.appendChild(empty);
      } else {
        filtered.forEach(todo => {
          const li = document.createElement('li');
          li.className = 'todo-item' + (todo.completed ? ' completed' : '');

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = todo.completed;
          checkbox.addEventListener('change', () => toggleTodo(todo.id));

          const span = document.createElement('span');
          span.className = 'todo-text';
          span.textContent = todo.text; // XSS 방지: innerHTML 미사용

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn';
          deleteBtn.textContent = '삭제';
          deleteBtn.addEventListener('click', () => deleteTodo(todo.id));

          li.appendChild(checkbox);
          li.appendChild(span);
          li.appendChild(deleteBtn);
          list.appendChild(li);
        });
      }

      const remaining = todos.filter(t => !t.completed).length;
      count.textContent = `남은 항목: ${remaining}개`;

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === currentFilter);
      });
    }

    // 이벤트 연결
    document.getElementById('todo-form').addEventListener('submit', async e => {
      e.preventDefault();
      const input = document.getElementById('todo-input');
      await addTodo(input.value);
      input.value = '';
    });

    document.getElementById('filter-tabs').addEventListener('click', e => {
      if (e.target.classList.contains('filter-btn')) {
        currentFilter = e.target.dataset.filter;
        render();
      }
    });

    // 초기화
    loadTodos();
  </script>
</body>
</html>
